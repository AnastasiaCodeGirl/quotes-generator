<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Quotes Generator</title>
  </head>
  <body>
    <header>
      <h1>AI Quotes Generator</h1>
    </header>
    <main>
      <form>
        <input
          type="text"
          placeholder="Enter the quote to inspire you today"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>
        Whole life is a search for beauty.
        <br />
        But, when the beauty is found inside, the search ends and a beautiful
        journey begins.
      </div>
    </main>
    <footer>
      This project is coded by Anastasiia Shumeiko and is
      <a
        href="https://github.com/AnastasiaCodeGirl/quotes-generator"
        target="_blank"
        >open-sourced on GitHub</a
      >
      and is hosted on Netlify
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
